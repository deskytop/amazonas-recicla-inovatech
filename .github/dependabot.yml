version: 2
updates:
  # npm em web/
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
    groups:
      next-ecosystem:
        patterns:
          - next
          - "@next/*"
          - react
          - react-dom
      supabase:
        patterns:
          - "@supabase/*"
      drizzle:
        patterns:
          - drizzle-orm
          - drizzle-kit
      types:
        patterns:
          - "@types/*"

  # github-actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - github-actions
